<div class="categories" data-pagefind-ignore="all">
    {{ if .Params.categories }}
        {{ range .Params.categories -}}
            <span class="bubble">
                <a href='{{ "/categories/" | relLangURL }}{{ . | urlize }}'>[{{ . | humanize }}]</a>
            </span>
        {{- end -}}
    {{- end }}
</div>
