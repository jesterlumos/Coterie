<header class="header">
    <h1><label class="header__nav-toggle" for="nav-toggle">&#9776;</label></h1>
    <h1 class="header__title">
        {{ partial "breadcrumbs.html" . }}
        <a href="{{ .Permalink }}">
            {{ with images.QR .Permalink }}
                <img src="{{ .RelPermalink }}" width="64px" height="64px" alt="QR code for the current page" class="qr-image">
            {{ end }}
        </a>
    </h1>
    {{ partial "categories" .}} 
    {{ partial "tags" .}} {{ if .Params.tags }} | {{- end }}
    {{ if not .IsHome }}
        {{ if .Date }} Last Modified: {{ .Date | time.Format ":date_medium" }} {{- end }}
    {{- end }}    
</header>
