<div class="tags" data-pagefind-ignore="all">
    {{ if .Params.tags }}
        Tags: 
        {{ range .Params.tags -}}
            <span class="bubble">
                <a href='{{ "/tags/" | relLangURL }}{{ . | urlize }}'>#{{ . | humanize }}</a>
            </span>
        {{- end -}}
    {{- end }}
</div>
