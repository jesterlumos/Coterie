{{ define "title" -}}
    <h1 data-pagefind-meta="title">{{ .Title }}</h1>
{{- end }}

{{ define "main" -}}
    {{ if .Params.summary }}
        <div class="summary">
            <h1 class="summary__label"> Summary </h1>
            <span class="summary__content">
                {{ .Summary  | .RenderString }}
            </span>
        </div>
    {{- end }}
    {{ .Content }}
    
    {{ partial "comments.html" . }}
{{ end }}
