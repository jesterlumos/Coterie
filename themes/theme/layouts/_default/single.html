{{ define "title" -}}
    <h2 data-pagefind-meta="title">{{ .Title }}</h2>
{{- end }}

{{ define "main" -}}
    {{ if .Params.summary }}
        <div class="summary">
            <h2 class="summary__label">Summary</h2>
            <span class="summary__content">
                {{ .Summary  | .RenderString }}
            </span>
        </div>
    {{- end }}
    {{ .Content }}
    
    {{ partial "comments.html" . }}
{{ end }}
